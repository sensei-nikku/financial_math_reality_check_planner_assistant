<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Reality Check Planner</title>
<style>
  :root {
    --simteal: #2B7A78;
    --simorange: #E8913A;
    --lightteal: #D0E8E6;
    --lightorange: #FAE5D0;
    --lightgray: #F2F2F2;
    --darkgray: #444444;
    --border: #CCCCCC;
    --white: #FFFFFF;
    --black: #111111;
  }
  * { box-sizing: border-box; }
  html, body {
    margin: 0; padding: 0;
    font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, Helvetica, Arial, sans-serif;
    font-size: 17px;
    color: var(--black);
    background: var(--lightgray);
    line-height: 1.5;
  }
  .wrap {
    max-width: 780px;
    margin: 0 auto;
    padding: 0 16px 120px 16px;
  }
  /* ========== HEADER ========== */
  header.top {
    background: var(--simteal);
    color: var(--white);
    padding: 14px 16px;
    margin-bottom: 18px;
  }
  header.top .inner {
    max-width: 780px; margin: 0 auto;
    display: flex; justify-content: space-between; align-items: center; flex-wrap: wrap; gap: 8px;
  }
  header.top h1 {
    font-size: 1.15em; margin: 0; font-weight: 700; letter-spacing: 0.5px;
  }
  header.top .who {
    font-size: 0.9em; opacity: 0.95;
  }
  /* ========== PROGRESS RAIL ========== */
  nav.progress {
    display: flex; gap: 6px; margin-bottom: 22px;
    padding: 0;
  }
  nav.progress .step {
    flex: 1;
    padding: 10px 4px;
    background: var(--white);
    border: 1px solid var(--border);
    text-align: center;
    font-size: 0.78em;
    font-weight: 600;
    color: var(--darkgray);
    border-radius: 3px;
  }
  nav.progress .step.done {
    background: var(--lightteal);
    border-color: var(--simteal);
    color: var(--simteal);
  }
  nav.progress .step.current {
    background: var(--simteal);
    border-color: var(--simteal);
    color: var(--white);
  }
  nav.progress .step .num { display: block; font-size: 1.1em; }
  /* ========== MAIN STAGE ========== */
  main .screen {
    background: var(--white);
    border: 1px solid var(--border);
    padding: 26px;
    margin-bottom: 20px;
    border-radius: 4px;
  }
  h2.sectionbar {
    background: var(--simteal);
    color: var(--white);
    padding: 10px 14px;
    margin: 0 0 16px 0;
    font-size: 1.05em;
    font-weight: 700;
    letter-spacing: 0.3px;
  }
  h3.taskbar {
    background: var(--simorange);
    color: var(--white);
    padding: 8px 14px;
    margin: 18px 0 12px 0;
    font-size: 0.98em;
    font-weight: 700;
  }
  .prompt {
    font-size: 1.05em;
    margin-bottom: 14px;
  }
  .hint {
    font-size: 0.88em;
    color: var(--darkgray);
    margin-top: 4px;
    font-style: italic;
  }
  /* ========== GOAL BOX / INFO BOX ========== */
  .goalbox {
    background: var(--lightteal);
    border: 1.5px solid var(--simteal);
    padding: 12px 14px;
    margin: 12px 0;
    border-radius: 3px;
  }
  .warnbox {
    background: var(--white);
    border: 1.5px solid var(--simorange);
    padding: 12px 14px;
    margin: 12px 0;
    border-radius: 3px;
  }
  /* ========== INPUTS ========== */
  input[type=text], select {
    font-family: inherit;
    font-size: 1em;
    padding: 10px 12px;
    border: 1.5px solid var(--border);
    border-radius: 3px;
    width: 100%;
    background: var(--white);
  }
  input[type=text]:focus, select:focus {
    outline: none;
    border-color: var(--simteal);
  }
  label.field {
    display: block;
    margin: 10px 0;
  }
  label.field .lbl {
    display: block;
    font-weight: 600;
    font-size: 0.95em;
    margin-bottom: 4px;
  }
  .row2 { display: grid; grid-template-columns: 1fr 1fr; gap: 12px; }
  @media (max-width: 540px) { .row2 { grid-template-columns: 1fr; } }
  /* ========== CHOICE CARDS ========== */
  .choices { display: grid; gap: 10px; margin: 8px 0 4px 0; }
  .choice {
    display: block;
    padding: 14px 16px;
    border: 1.5px solid var(--border);
    background: var(--white);
    border-radius: 3px;
    cursor: pointer;
    user-select: none;
  }
  .choice:hover { background: var(--lightgray); }
  .choice.selected {
    border-color: var(--simteal);
    background: var(--lightteal);
  }
  .choice .title { font-weight: 700; display: block; }
  .choice .desc { font-size: 0.88em; color: var(--darkgray); margin-top: 2px; }
  /* ========== GATE GRID (Y/N rows) ========== */
  .gates { margin: 10px 0; }
  .gate {
    display: grid;
    grid-template-columns: 1fr auto;
    gap: 10px;
    align-items: center;
    padding: 10px 0;
    border-bottom: 1px solid var(--lightgray);
  }
  .gate:last-child { border-bottom: none; }
  .gate .q { font-size: 0.95em; }
  .gate .q .sub { display: block; font-size: 0.85em; color: var(--darkgray); margin-top: 2px; font-style: italic; }
  .gate .yn { display: flex; gap: 6px; }
  .gate .yn button {
    font-family: inherit;
    font-size: 0.9em;
    font-weight: 600;
    padding: 6px 14px;
    border: 1.5px solid var(--border);
    background: var(--white);
    cursor: pointer;
    border-radius: 3px;
    min-width: 44px;
  }
  .gate .yn button.on {
    background: var(--simteal);
    border-color: var(--simteal);
    color: var(--white);
  }
  /* ========== HEADCOUNT GRID ========== */
  .countgrid { display: grid; grid-template-columns: repeat(4, 1fr); gap: 10px; margin: 10px 0; }
  @media (max-width: 540px) { .countgrid { grid-template-columns: repeat(2, 1fr); } }
  .countgrid .cell { text-align: center; }
  .countgrid .cell .lbl { font-size: 0.82em; font-weight: 600; color: var(--darkgray); margin-bottom: 4px; }
  .countgrid .cell input {
    text-align: center;
    font-size: 1.25em;
    font-weight: 700;
    padding: 8px;
  }
  .countgrid .cell.fixed {
    padding: 8px;
    background: var(--lightteal);
    border: 1.5px solid var(--simteal);
    border-radius: 3px;
    font-size: 1.25em;
    font-weight: 700;
  }
  /* ========== FOOTER NAV ========== */
  footer.nav {
    position: fixed; bottom: 0; left: 0; right: 0;
    background: var(--white);
    border-top: 1px solid var(--border);
    padding: 12px 16px;
    box-shadow: 0 -2px 8px rgba(0,0,0,0.05);
    z-index: 100;
  }
  footer.nav .inner {
    max-width: 780px; margin: 0 auto;
    display: flex; justify-content: space-between; align-items: center; gap: 10px;
  }
  .btn {
    font-family: inherit;
    font-size: 1em;
    font-weight: 600;
    padding: 11px 22px;
    border: 1.5px solid var(--border);
    background: var(--white);
    color: var(--black);
    cursor: pointer;
    border-radius: 3px;
    min-height: 44px;
  }
  .btn:hover:not(:disabled) { background: var(--lightgray); }
  .btn.primary {
    background: var(--simteal);
    border-color: var(--simteal);
    color: var(--white);
  }
  .btn.primary:hover:not(:disabled) { filter: brightness(1.1); }
  .btn:disabled { opacity: 0.4; cursor: not-allowed; }
  .btn-small { font-size: 0.85em; padding: 7px 14px; min-height: 0; }
  .tools { display: flex; gap: 6px; }
  /* ========== CARD (printable output) ========== */
  .card {
    background: var(--white);
    border: 2px solid var(--simteal);
    padding: 20px;
    margin: 16px 0;
    border-radius: 4px;
  }
  .card h3 {
    background: var(--simteal);
    color: var(--white);
    margin: -20px -20px 14px -20px;
    padding: 12px 18px;
    font-size: 1.1em;
  }
  .card table { width: 100%; border-collapse: collapse; margin: 8px 0; }
  .card td { padding: 7px 6px; border-bottom: 1px solid var(--lightgray); font-size: 0.95em; vertical-align: top; }
  .card td:first-child { font-weight: 600; color: var(--darkgray); width: 45%; }
  .card .packet {
    margin-top: 14px;
    padding: 14px;
    background: var(--lightorange);
    border: 1.5px solid var(--simorange);
    border-radius: 3px;
  }
  .card .packet .hdr { font-weight: 700; color: var(--simorange); text-transform: uppercase; font-size: 0.82em; letter-spacing: 1px; }
  .card .packet .name { font-size: 1.2em; font-weight: 700; margin-top: 4px; }
  /* ========== PRINT ========== */
  @media print {
    body { background: white; }
    header.top, nav.progress, footer.nav, .no-print { display: none !important; }
    main .screen { border: none; padding: 0; }
    .card { break-inside: avoid; }
    .wrap { padding: 0; max-width: none; }
  }
  /* ========== MODAL ========== */
  .modal-bg {
    position: fixed; inset: 0; background: rgba(0,0,0,0.5);
    display: flex; align-items: center; justify-content: center;
    z-index: 200;
  }
  .modal {
    background: var(--white); padding: 24px; border-radius: 4px;
    max-width: 380px; width: calc(100% - 32px);
  }
  .modal h3 { margin-top: 0; }
</style>
</head>
<body>

<header class="top">
  <div class="inner">
    <h1>MONEY REALITY CHECK — PLANNER</h1>
    <div class="who" id="whoLabel">&nbsp;</div>
  </div>
</header>

<div class="wrap">
  <nav class="progress" id="progress"></nav>
  <main id="stage"></main>
</div>

<footer class="nav">
  <div class="inner">
    <button class="btn" id="backBtn">&larr; Back</button>
    <div class="tools">
      <button class="btn btn-small" id="saveBtn" title="Copy your save link so you can paste it into an email to yourself">Copy link</button>
      <button class="btn btn-small" id="resetBtn" title="Reset (password required)">Reset</button>
    </div>
    <button class="btn primary" id="nextBtn">Continue &rarr;</button>
  </div>
</footer>

<div id="modalHost"></div>

<script>
// ============================================================
// STATE
// ============================================================
const SCHEMA = 1;
const PHASES = [
  { id:'i', label:'Intro',      full:'Intro' },
  { id:'1', label:'Phase 1',    full:'Income & Taxes' },
  { id:'2', label:'Phase 2',    full:'Housing' },
  { id:'3', label:'Phase 3',    full:'Transportation' },
  { id:'4', label:'Phase 4',    full:'Living Costs' },
  { id:'5', label:'Phase 5',    full:'Balance' }
];

function blankState() {
  return {
    v: SCHEMA,
    ph: 'i',   // current phase
    st: 0,     // step within phase
    done: [],  // phases completed
    nm: '',
    // intro
    ht: null,  // 's' | 'p' | 'f'
    hc: [1,0,0,0], // you, partner, kids, adultDep
    af: [],    // aspiration flags
    // phase 1 — income & taxes
    loc: '',
    job: '',
    ig: { sw:null, se:null, pw:null, pe:null, aw:null, ot:null, nt:null, po:null },
    fs: null,  // 's' | 'mfj' | 'hoh'
    // phase 2 — housing
    hp: null,  // 'rm'|'rs'|'bm'|'om'|'oo'
    br: null,  // bedroom count
    pets: null, // 'none'|'few'|'many'
    // phase 3 — transport (later)
    ls: null, tm: null, tpt: null,
    // phase 4 — living (later)
    lg: { med:null, edu:null, crt:null, rel:null, sub:null },
    // results captured from packets
    results: { W:null, MB:null, HB:null, TB:null, LB:null }
  };
}
let state = blankState();

// ============================================================
// SAVE / LOAD
// Primary: URL hash (works on Chromebooks where localStorage is flaky,
// and survives reloads on normal deploys).
// Fallback: localStorage (for sandboxed environments like about:srcdoc
// where replaceState is blocked — e.g. Claude artifact preview).
// If both fail, state is kept in memory only for this session.
// ============================================================
const LS_KEY = 'rc_planner_v' + SCHEMA;
let urlSaveDisabled = false;  // flipped true after first replaceState failure
let lsSaveDisabled  = false;  // flipped true after first localStorage failure
let saveMode = 'url';          // 'url' | 'local' | 'memory'

// Safe log helper — some preview sandboxes only implement a subset of console methods.
function safeLog(msg) {
  try {
    if (typeof console !== 'undefined') {
      const fn = console.log || console.warn || console.error;
      if (typeof fn === 'function') fn.call(console, msg);
    }
  } catch(e) { /* nothing we can do */ }
}

function encodeState() {
  const s = JSON.stringify(state);
  return btoa(unescape(encodeURIComponent(s)));
}
function decodeState(encoded) {
  const s = decodeURIComponent(escape(atob(encoded)));
  const obj = JSON.parse(s);
  if (obj.v !== SCHEMA) throw new Error('schema mismatch');
  return obj;
}

function saveState() {
  // Try URL hash first unless we've given up on it this session
  if (!urlSaveDisabled) {
    try {
      history.replaceState(null, '', '#' + encodeState());
      saveMode = 'url';
      return;
    } catch(e) {
      urlSaveDisabled = true;
      safeLog('[planner] URL save unavailable (likely sandboxed iframe); falling back to localStorage.');
    }
  }
  // Try localStorage
  if (!lsSaveDisabled) {
    try {
      localStorage.setItem(LS_KEY, JSON.stringify(state));
      saveMode = 'local';
      return;
    } catch(e) {
      lsSaveDisabled = true;
      safeLog('[planner] localStorage also unavailable; state kept in memory only.');
    }
  }
  // Memory-only fallback
  saveMode = 'memory';
}

function normalizeState(obj) {
  // Deep-merge the blank state with the loaded obj so any newly-added keys
  // (e.g. when the gate schema grows) get defaults instead of undefined.
  // Nested objects like ig / lg / hc / results need field-level merging;
  // Object.assign alone would wholesale-replace them.
  const base = blankState();
  const out = Object.assign({}, base, obj);
  // Migrate ig: drop any obsolete keys (old shape had pt, nw), keep only current keys
  const newIg = Object.assign({}, base.ig);
  if (obj && obj.ig) {
    for (const k of Object.keys(newIg)) {
      if (k in obj.ig) newIg[k] = obj.ig[k];
    }
  }
  out.ig = newIg;
  // Same field-level merge for other nested objects
  if (obj && obj.lg) out.lg = Object.assign({}, base.lg, obj.lg);
  if (obj && obj.results) out.results = Object.assign({}, base.results, obj.results);
  if (obj && Array.isArray(obj.hc)) out.hc = obj.hc.slice(0, 4).concat(base.hc.slice(obj.hc.length));
  return out;
}

function loadState() {
  // Try URL hash first
  try {
    const h = location.hash.replace(/^#/, '');
    if (h) {
      const obj = decodeState(h);
      state = normalizeState(obj);
      return true;
    }
  } catch(e) { /* fall through */ }
  // Fall back to localStorage
  try {
    const raw = localStorage.getItem(LS_KEY);
    if (raw) {
      const obj = JSON.parse(raw);
      if (obj.v === SCHEMA) {
        state = normalizeState(obj);
        return true;
      }
    }
  } catch(e) { /* fall through */ }
  return false;
}

// ============================================================
// COPY TO CLIPBOARD
// Universal — works in every modern browser including sandboxed iframes.
// No mailto, no Gmail protocol handlers, no email capture. Student copies
// the text and pastes into Gmail / Google Docs / wherever they want it.
// ============================================================
async function copyText(text) {
  try {
    if (navigator.clipboard && navigator.clipboard.writeText) {
      await navigator.clipboard.writeText(text);
      return true;
    }
  } catch(e) { /* fall through to execCommand */ }
  try {
    const ta = document.createElement('textarea');
    ta.value = text;
    ta.setAttribute('readonly', '');
    ta.style.position = 'fixed';
    ta.style.left = '-9999px';
    document.body.appendChild(ta);
    ta.focus();
    ta.select();
    const ok = document.execCommand('copy');
    document.body.removeChild(ta);
    return ok;
  } catch(e) { return false; }
}

// Swap a button to "Copied ✓" for a moment after a successful copy.
async function copyAndFlash(btn, text) {
  const ok = await copyText(text);
  const orig = btn.textContent;
  btn.textContent = ok ? 'Copied ✓' : 'Copy failed';
  btn.disabled = true;
  setTimeout(() => {
    btn.textContent = orig;
    btn.disabled = false;
  }, 1400);
}

// ----- Plain-text card builders -----
function ynText(k) { return state.ig[k] === 'Y' ? 'Y — complete this task' : 'N — write $0, skip this task'; }
function htText()  { return { s:'Single', p:'Partnered', f:'Family' }[state.ht] || '—'; }
function fsText()  { return { s:'Single', mfj:'Married Filing Jointly', hoh:'Head of Household' }[state.fs] || '—'; }
function aspText() {
  if (state.af.length === 0) return '(none marked)';
  if (state.af.includes('n')) return 'Nothing (realistic current life)';
  const map = { j:'Job', c:'City', h:'Housing', t:'Transportation' };
  return state.af.map(a => map[a]).filter(Boolean).join(', ');
}
function hpText() {
  return { rm:'Rent — Moving (new rental)',
           rs:'Rent — Staying (current lease)',
           bm:'Buy — Moving (purchasing)',
           om:'Own — still paying mortgage',
           oo:'Own — outright, no mortgage' }[state.hp] || '—';
}
function packetForHp() {
  if (state.hp === 'rm' || state.hp === 'rs') return 'Section 2 — Rent';
  if (state.hp === 'bm') return 'Section 2 — Buy';
  if (state.hp === 'om' || state.hp === 'oo') return 'Section 2 — Own';
  return '—';
}
function petsText() {
  return { none:'None', few:'1–2 pets', many:'3+ pets' }[state.pets] || '—';
}
function money(n) {
  if (n === null || n === undefined || isNaN(n)) return '—';
  return '$' + Number(n).toLocaleString('en-US', {minimumFractionDigits: 0, maximumFractionDigits: 2});
}

function buildIntroCardText() {
  return [
    'REALITY CHECK — INTRO SNAPSHOT',
    '',
    'Name: ' + (state.nm || '—'),
    'Household type: ' + htText(),
    'You: 1',
    'Partner: ' + state.hc[1],
    'Children under 18: ' + state.hc[2],
    'Adult dependents: ' + state.hc[3],
    'Household Size [HS]: ' + totalHS(),
    'Aspirational about: ' + aspText(),
    '',
    'Up next: Phase 1 — Income & Taxes',
    '',
    '---',
    'Resume the planner anytime by clicking here:',
    location.href
  ].join('\n');
}

function buildP1CardText() {
  return [
    'REALITY CHECK — PHASE 1 CARD (INCOME & TAXES)',
    '',
    'Name: ' + (state.nm || '—'),
    'Household type: ' + htText(),
    'Household Size [HS]: ' + totalHS(),
    'City [L]: ' + (state.loc || '—'),
    'Job [C]: ' + (state.job || '—'),
    'Filing status: ' + fsText(),
    '',
    'PRIMARY INCOME (YOU)',
    '  W-2 wages [SW]:            ' + ynText('sw'),
    '  Self-employment [SE]:      ' + ynText('se'),
    '',
    'PARTNER INCOME',
    '  Partner W-2 [PW]:          ' + ynText('pw'),
    '  Partner self-emp [PE]:     ' + ynText('pe'),
    '',
    'OTHER GATES',
    '  Additional wages [AW]:     ' + ynText('aw'),
    '  Other taxable [OT]:        ' + ynText('ot'),
    '  Non-taxable income [NTI]:  ' + ynText('nt'),
    '  Payments out [PO]:         ' + ynText('po'),
    '',
    'PACKET TO GRAB: Section 1 — Income & Taxes',
    '',
    'When you finish the packet, come back to the planner with your',
    'final [MB] (monthly budget) to start Phase 2.',
    '',
    '---',
    'Resume the planner anytime by clicking here:',
    location.href
  ].join('\n');
}

function buildP2CardText() {
  return [
    'REALITY CHECK — PHASE 2 CARD (HOUSING)',
    '',
    'Name: ' + (state.nm || '—'),
    'City [L]: ' + (state.loc || '—'),
    'Household Size [HS]: ' + totalHS(),
    'Monthly Budget [MB] from Section 1: ' + money(state.results.MB),
    '',
    'HOUSING DECISIONS',
    '  Path: ' + hpText(),
    '  Bedrooms: ' + (state.br || '—'),
    '  Pets: ' + petsText(),
    '',
    'PACKET TO GRAB: ' + packetForHp(),
    '',
    'When you finish the packet, come back with your final [HB]',
    '(monthly housing budget) to start Phase 3.',
    '',
    '---',
    'Resume the planner anytime by clicking here:',
    location.href
  ].join('\n');
}

function buildSaveLinkText() {
  const phNow = PHASES.find(p => p.id === state.ph);
  const phLabel = phNow ? phNow.full : '(unknown)';
  const doneLabels = state.done.map(id => {
    const p = PHASES.find(x => x.id === id); return p ? p.full : id;
  });
  return [
    'REALITY CHECK PLANNER — YOUR SAVE LINK',
    '',
    'Click this link any time to pick up where you left off:',
    location.href,
    '',
    'Name: ' + (state.nm || '—'),
    'Currently on: ' + phLabel,
    'Completed so far: ' + (doneLabels.length ? doneLabels.join(', ') : '(none yet)'),
    '',
    'CAPTURED RESULTS',
    '  Gross income [W]:          ' + money(state.results.W),
    '  Monthly Budget [MB]:       ' + money(state.results.MB),
    '  Housing Budget [HB]:       ' + money(state.results.HB),
    '  Transportation [TB]:       ' + money(state.results.TB),
    '  Living costs [LB]:         ' + money(state.results.LB)
  ].join('\n');
}

// ============================================================
// SCREEN REGISTRY
// Each phase has a list of steps. Each step has a render fn and a validate fn.
// ============================================================
const SCREENS = {
  i: [
    { id:'welcome',    render: renderWelcome,    valid: ()=>state.nm.trim().length > 0 },
    { id:'household',  render: renderHousehold,  valid: ()=>state.ht !== null },
    { id:'headcount',  render: renderHeadcount,  valid: ()=>state.hc[0] === 1 },
    { id:'aspiration', render: renderAspiration, valid: ()=>true },
    { id:'intro_card', render: renderIntroCard,  valid: ()=>true, isCard: true, nextLabel: 'Start Phase 1 →' }
  ],
  '1': [
    { id:'p1_loc',     render: renderP1Location,       valid: ()=>state.loc.trim().length > 0 && state.job.trim().length > 0 },
    { id:'p1_your',    render: renderP1YourIncome,     valid: ()=>state.ig.sw === 'Y' || state.ig.se === 'Y' },
    { id:'p1_partner', render: renderP1PartnerIncome,  valid: ()=>true },

function el(tag, attrs={}, ...kids) {
  const n = document.createElement(tag);
  for (const k in attrs) {
    if (k === 'class') n.className = attrs[k];
    else if (k === 'html') n.innerHTML = attrs[k];
    else if (k.startsWith('on')) n.addEventListener(k.slice(2), attrs[k]);
    else n.setAttribute(k, attrs[k]);
  }
  for (const kid of kids) {
    if (kid == null) continue;
    n.appendChild(typeof kid === 'string' ? document.createTextNode(kid) : kid);
  }
  return n;
}
function clear(node){ while(node.firstChild) node.removeChild(node.firstChild); }

function renderProgress() {
  const host = document.getElementById('progress');
  clear(host);
  for (const p of PHASES) {
    const isDone = state.done.includes(p.id);
    const isCurrent = state.ph === p.id;
    const cls = 'step' + (isCurrent ? ' current' : '') + (isDone ? ' done' : '');
    host.appendChild(el('div', {class:cls},
      el('span', {class:'num'}, p.label),
      el('span', {}, p.full)
    ));
  }
}

function renderResultEntry(opts) {
  // opts: { title, intro, fieldLabel, varKey, varLabel, blurb }
  return function(host) {
    const screen = el('div', {class:'screen'},
      el('h2', {class:'sectionbar'}, opts.title),
      el('p', {class:'prompt'}, opts.intro),
      el('div', {class:'warnbox'},
        el('div', {html: opts.blurb})
      ),
      el('label', {class:'field'},
        el('span', {class:'lbl'}, opts.fieldLabel),
        (() => {
          const wrap = el('div', {style:'display:flex; align-items:center; gap:8px;'},
            el('span', {style:'font-size:1.2em; font-weight:700; color:var(--darkgray);'}, '$'),
            (() => {
              const cur = state.results[opts.varKey];
              const i = el('input', {type:'text', inputmode:'decimal', placeholder:'e.g. 4200',
                                      value: (cur === null || cur === undefined) ? '' : String(cur)});
              i.style.fontSize = '1.2em';
              i.style.fontWeight = '600';
              i.addEventListener('input', e => {
                const raw = e.target.value.replace(/[^0-9.]/g, '');
                const n = parseFloat(raw);
                state.results[opts.varKey] = (!isNaN(n) && n >= 0) ? n : null;
                saveState(); refreshNav();
              });
              return i;
            })()
          );
          return wrap;
        })()
      )
    );
    host.appendChild(screen);
  };
}

// ============================================================
// NAVIGATION
// ============================================================
function currentStep() {
  return SCREENS[state.ph][state.st];
}
function rerender() {
  const stage = document.getElementById('stage');
  clear(stage);
  const step = currentStep();
  step.render(stage);
  renderProgress();
  renderWho();
  refreshNav();
}
function refreshNav() {
  const back = document.getElementById('backBtn');
  const next = document.getElementById('nextBtn');
  const phIdx = PHASES.findIndex(p => p.id === state.ph);
  const isFirst = phIdx === 0 && state.st === 0;
  const step = currentStep();
  const steps = SCREENS[state.ph];
  const isLastStep = state.st === steps.length - 1;
  const isLastPhase = phIdx === PHASES.length - 1;

  back.disabled = isFirst;
  next.disabled = !step.valid();

  if (step.nextLabel) next.textContent = step.nextLabel;
  else if (isLastStep && !isLastPhase) next.textContent = 'Start ' + PHASES[phIdx+1].full + ' →';
  else if (isLastStep && isLastPhase) next.textContent = 'Finish';
  else next.textContent = 'Continue →';
}
function goNext() {
  const step = currentStep();
  if (!step.valid()) return;
  const steps = SCREENS[state.ph];
  if (state.st < steps.length - 1) {
    state.st += 1;
  } else {
    // move to next phase
    if (!state.done.includes(state.ph)) state.done.push(state.ph);
    const phIdx = PHASES.findIndex(p => p.id === state.ph);
    if (phIdx < PHASES.length - 1) {
      state.ph = PHASES[phIdx+1].id;
      state.st = 0;
    }
  }
  saveState();
  rerender();
  window.scrollTo(0, 0);
}
function goBack() {
  if (state.st > 0) {
    state.st -= 1;
  } else {
    const phIdx = PHASES.findIndex(p => p.id === state.ph);
    if (phIdx > 0) {
      state.ph = PHASES[phIdx-1].id;
      state.st = SCREENS[state.ph].length - 1;
    }
  }
  saveState();
  rerender();
  window.scrollTo(0, 0);
}

// ============================================================
// RESET MODAL
// ============================================================
function promptReset() {
  const host = document.getElementById('modalHost');
  clear(host);
  const mb = el('div', {class:'modal-bg'});
  const pw = el('input', {type:'password', placeholder:'password'});
  const msg = el('div', {style:'color:#c33; font-size:0.85em; min-height:18px; margin-top:6px;'});
  const modal = el('div', {class:'modal'},
    el('h3', {}, 'Reset everything?'),
    el('p', {style:'font-size:0.95em;'}, 'This erases all answers and starts the planner over. Enter the teacher password to confirm.'),
    pw,
    msg,
    el('div', {style:'display:flex; gap:10px; margin-top:14px; justify-content:flex-end;'},
      el('button', {class:'btn btn-small', onclick: () => clear(host)}, 'Cancel'),
      el('button', {class:'btn btn-small primary', onclick: () => {
        if (pw.value === 'kuso') {
          state = blankState();
          saveState();
          clear(host);
          rerender();
          window.scrollTo(0, 0);
        } else {
          msg.textContent = 'Wrong password.';
          pw.value = '';
          pw.focus();
        }
      }}, 'Reset')
    )
  );
  mb.appendChild(modal);
  host.appendChild(mb);
  setTimeout(() => pw.focus(), 40);
  pw.addEventListener('keydown', e => { if (e.key === 'Enter') modal.querySelector('.primary').click(); });
}

// ============================================================
// BOOT
// ============================================================
document.getElementById('nextBtn').addEventListener('click', goNext);
document.getElementById('backBtn').addEventListener('click', goBack);
document.getElementById('saveBtn').addEventListener('click', () => {
  const b = document.getElementById('saveBtn');
  copyAndFlash(b, buildSaveLinkText());
});
document.getElementById('resetBtn').addEventListener('click', promptReset);

loadState();
rerender();
</script>
